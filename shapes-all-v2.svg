<svg width="100%" viewBox="0 0 680 1400" xmlns="http://www.w3.org/2000/svg" style="background:#1a1a1a;border-radius:12px;padding:16px 10px">

<!-- ═══════════════════════════════════════════════════════ -->
<!-- 1. TETRAHEDRAL CH₄ — proper 3D wedge/dash              -->
<!-- ═══════════════════════════════════════════════════════ -->
<g transform="translate(170, 140)">
  <!-- Central atom -->
  <circle cx="0" cy="0" r="20" fill="#2a2a2a" stroke="#4d9460" stroke-width="2.2"/>
  <text x="0" y="5" text-anchor="middle" fill="#e8e5de" font-size="15" font-weight="600" font-family="sans-serif">C</text>

  <!-- Bond UP (solid — in the plane of paper) -->
  <line x1="0" y1="-20" x2="0" y2="-85" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>
  <text x="0" y="-95" text-anchor="middle" fill="#9a9690" font-size="14" font-family="sans-serif">H</text>

  <!-- Bond DOWN-LEFT (solid — in the plane) -->
  <line x1="-14" y1="14" x2="-72" y2="72" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>
  <text x="-82" y="82" text-anchor="middle" fill="#9a9690" font-size="14" font-family="sans-serif">H</text>

  <!-- Bond TOWARDS VIEWER (wedge — solid filled triangle) -->
  <polygon points="10,14 62,52 62,68" fill="#4d9460" fill-opacity="0.4" stroke="#4d9460" stroke-width="1.2" stroke-linejoin="round"/>
  <text x="72" y="68" text-anchor="start" fill="#9a9690" font-size="14" font-family="sans-serif">H</text>

  <!-- Bond AWAY FROM VIEWER (dashed) -->
  <line x1="14" y1="-8" x2="72" y2="-42" stroke="#4d9460" stroke-width="2.2" stroke-dasharray="5,4" stroke-linecap="round" opacity="0.6"/>
  <text x="82" y="-42" text-anchor="start" fill="#9a9690" font-size="14" font-family="sans-serif">H</text>

  <!-- Bond angle arc -->
  <path d="M-40,38 A50,50 0 0,1 -10,-50" fill="none" stroke="#706b65" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="-48" y="-10" fill="#9a9690" font-size="10" font-family="sans-serif">109.5°</text>

  <!-- Label -->
  <text x="0" y="110" text-anchor="middle" fill="#4d9460" font-size="13" font-weight="500" font-family="sans-serif">CH₄ — tetrahedral</text>
</g>

<!-- ═══════════════════════════════════════════════════════ -->
<!-- 2. PYRAMIDAL NH₃ — lone pair UP, 3 H bonds DOWN        -->
<!-- Nitrogen at top, H atoms form a triangular base below  -->
<!-- ═══════════════════════════════════════════════════════ -->
<g transform="translate(510, 140)">
  <!-- Central atom -->
  <circle cx="0" cy="0" r="20" fill="#2a2a2a" stroke="#4d9460" stroke-width="2.2"/>
  <text x="0" y="5" text-anchor="middle" fill="#e8e5de" font-size="15" font-weight="600" font-family="sans-serif">N</text>

  <!-- LONE PAIR pointing UP — orbital lobe -->
  <path d="M-9,-24 C-20,-50 -16,-80 0,-95 C16,-80 20,-50 9,-24 Z" fill="#d4a24c" fill-opacity="0.10" stroke="#d4a24c" stroke-width="1.3" stroke-opacity="0.45"/>
  <path d="M-5,-28 C-12,-48 -10,-72 0,-82 C10,-72 12,-48 5,-28 Z" fill="#d4a24c" fill-opacity="0.20"/>
  <text x="30" y="-60" fill="#d4a24c" font-size="11" font-family="sans-serif">lone pair</text>
  <line x1="18" y1="-55" x2="26" y2="-58" stroke="#d4a24c" stroke-width="0.5" stroke-dasharray="2,2"/>

  <!-- Bond DOWN-LEFT (solid — in the plane) -->
  <line x1="-14" y1="14" x2="-75" y2="80" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>
  <text x="-85" y="90" text-anchor="middle" fill="#9a9690" font-size="14" font-family="sans-serif">H</text>

  <!-- Bond DOWN-RIGHT (solid — in the plane) -->
  <line x1="14" y1="14" x2="75" y2="80" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>
  <text x="85" y="90" text-anchor="middle" fill="#9a9690" font-size="14" font-family="sans-serif">H</text>

  <!-- Bond TOWARDS VIEWER (wedge — pointing down-centre) -->
  <polygon points="-8,18 -18,82 18,82 8,18" fill="#4d9460" fill-opacity="0.35" stroke="#4d9460" stroke-width="1" stroke-linejoin="round"/>
  <text x="0" y="98" text-anchor="middle" fill="#9a9690" font-size="14" font-family="sans-serif">H</text>

  <!-- Bond angle arc between the two side bonds -->
  <path d="M-42,44 A52,52 0 0,1 42,44" fill="none" stroke="#706b65" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="0" y="55" text-anchor="middle" fill="#9a9690" font-size="10" font-family="sans-serif">107°</text>

  <!-- Label -->
  <text x="0" y="120" text-anchor="middle" fill="#4d9460" font-size="13" font-weight="500" font-family="sans-serif">NH₃ — pyramidal</text>
</g>

<!-- ═══════════════════════════════════════════════════════ -->
<!-- 3. TRIGONAL PLANAR BF₃ — 3 bonds at 120°               -->
<!-- ═══════════════════════════════════════════════════════ -->
<g transform="translate(170, 380)">
  <!-- Central atom -->
  <circle cx="0" cy="0" r="20" fill="#2a2a2a" stroke="#4d9460" stroke-width="2.2"/>
  <text x="0" y="5" text-anchor="middle" fill="#e8e5de" font-size="15" font-weight="600" font-family="sans-serif">B</text>

  <!-- Bond UP -->
  <line x1="0" y1="-20" x2="0" y2="-85" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>
  <text x="0" y="-95" text-anchor="middle" fill="#9a9690" font-size="14" font-family="sans-serif">F</text>

  <!-- Bond DOWN-LEFT (120° from up) -->
  <line x1="-15" y1="12" x2="-75" y2="50" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>
  <text x="-88" y="58" text-anchor="middle" fill="#9a9690" font-size="14" font-family="sans-serif">F</text>

  <!-- Bond DOWN-RIGHT (120° from up) -->
  <line x1="15" y1="12" x2="75" y2="50" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>
  <text x="88" y="58" text-anchor="middle" fill="#9a9690" font-size="14" font-family="sans-serif">F</text>

  <!-- Angle arc -->
  <path d="M-40,26 A48,48 0 0,1 -10,-48" fill="none" stroke="#706b65" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="-44" y="-14" fill="#9a9690" font-size="10" font-family="sans-serif">120°</text>

  <!-- Label -->
  <text x="0" y="95" text-anchor="middle" fill="#4d9460" font-size="13" font-weight="500" font-family="sans-serif">BF₃ — trigonal planar</text>
</g>

<!-- ═══════════════════════════════════════════════════════ -->
<!-- 4. BENT H₂O — 2 lone pairs UP, 2 H bonds DOWN          -->
<!-- ═══════════════════════════════════════════════════════ -->
<g transform="translate(510, 380)">
  <!-- Central atom -->
  <circle cx="0" cy="0" r="20" fill="#2a2a2a" stroke="#4d9460" stroke-width="2.2"/>
  <text x="0" y="5" text-anchor="middle" fill="#e8e5de" font-size="15" font-weight="600" font-family="sans-serif">O</text>

  <!-- TWO LONE PAIRS pointing UP — orbital lobes splayed apart -->
  <!-- Lone pair 1 (up-left) -->
  <g transform="rotate(-25)">
    <path d="M-8,-24 C-18,-48 -14,-75 0,-90 C14,-75 18,-48 8,-24 Z" fill="#d4a24c" fill-opacity="0.10" stroke="#d4a24c" stroke-width="1.2" stroke-opacity="0.4"/>
    <path d="M-5,-27 C-11,-45 -9,-65 0,-76 C9,-65 11,-45 5,-27 Z" fill="#d4a24c" fill-opacity="0.18"/>
  </g>
  <!-- Lone pair 2 (up-right) -->
  <g transform="rotate(25)">
    <path d="M-8,-24 C-18,-48 -14,-75 0,-90 C14,-75 18,-48 8,-24 Z" fill="#d4a24c" fill-opacity="0.10" stroke="#d4a24c" stroke-width="1.2" stroke-opacity="0.4"/>
    <path d="M-5,-27 C-11,-45 -9,-65 0,-76 C9,-65 11,-45 5,-27 Z" fill="#d4a24c" fill-opacity="0.18"/>
  </g>
  <text x="0" y="-88" text-anchor="middle" fill="#d4a24c" font-size="11" font-family="sans-serif">2 lone pairs</text>

  <!-- Bond DOWN-LEFT -->
  <line x1="-14" y1="14" x2="-75" y2="75" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>
  <text x="-85" y="85" text-anchor="middle" fill="#9a9690" font-size="14" font-family="sans-serif">H</text>

  <!-- Bond DOWN-RIGHT -->
  <line x1="14" y1="14" x2="75" y2="75" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>
  <text x="85" y="85" text-anchor="middle" fill="#9a9690" font-size="14" font-family="sans-serif">H</text>

  <!-- Bond angle arc -->
  <path d="M-40,40 A50,50 0 0,1 40,40" fill="none" stroke="#706b65" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="0" y="50" text-anchor="middle" fill="#9a9690" font-size="10" font-family="sans-serif">104.5°</text>

  <!-- Label -->
  <text x="0" y="110" text-anchor="middle" fill="#4d9460" font-size="13" font-weight="500" font-family="sans-serif">H₂O — bent</text>
</g>

<!-- ═══════════════════════════════════════════════════════ -->
<!-- 5. LINEAR CO₂ — double bonds shown                     -->
<!-- ═══════════════════════════════════════════════════════ -->
<g transform="translate(170, 580)">
  <!-- Central atom -->
  <circle cx="0" cy="0" r="20" fill="#2a2a2a" stroke="#4d9460" stroke-width="2.2"/>
  <text x="0" y="5" text-anchor="middle" fill="#e8e5de" font-size="15" font-weight="600" font-family="sans-serif">C</text>

  <!-- Double bond LEFT (two parallel lines) -->
  <line x1="-20" y1="-3" x2="-90" y2="-3" stroke="#4d9460" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="-20" y1="3" x2="-90" y2="3" stroke="#4d9460" stroke-width="2.2" stroke-linecap="round"/>
  <text x="-105" y="5" text-anchor="middle" fill="#9a9690" font-size="14" font-family="sans-serif">O</text>

  <!-- Double bond RIGHT -->
  <line x1="20" y1="-3" x2="90" y2="-3" stroke="#4d9460" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="20" y1="3" x2="90" y2="3" stroke="#4d9460" stroke-width="2.2" stroke-linecap="round"/>
  <text x="105" y="5" text-anchor="middle" fill="#9a9690" font-size="14" font-family="sans-serif">O</text>

  <!-- Angle -->
  <text x="0" y="35" text-anchor="middle" fill="#9a9690" font-size="10" font-family="sans-serif">180°</text>

  <!-- Label -->
  <text x="0" y="60" text-anchor="middle" fill="#4d9460" font-size="13" font-weight="500" font-family="sans-serif">CO₂ — linear</text>
</g>

<!-- ═══════════════════════════════════════════════════════ -->
<!-- 6. OCTAHEDRAL SF₆ — 6 bonds at 90°                     -->
<!-- ═══════════════════════════════════════════════════════ -->
<g transform="translate(510, 580)">
  <!-- Central atom -->
  <circle cx="0" cy="0" r="20" fill="#2a2a2a" stroke="#4d9460" stroke-width="2.2"/>
  <text x="0" y="5" text-anchor="middle" fill="#e8e5de" font-size="14" font-weight="600" font-family="sans-serif">S</text>

  <!-- 4 bonds in the plane (up, down, left, right) -->
  <line x1="0" y1="-20" x2="0" y2="-80" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="0" y1="20" x2="0" y2="80" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="-20" y1="0" x2="-80" y2="0" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20" y1="0" x2="80" y2="0" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Wedge bond (towards viewer) -->
  <polygon points="10,14 42,52 58,42" fill="#4d9460" fill-opacity="0.35" stroke="#4d9460" stroke-width="1" stroke-linejoin="round"/>
  <!-- Dashed bond (away from viewer) -->
  <line x1="-10" y1="-14" x2="-50" y2="-50" stroke="#4d9460" stroke-width="2" stroke-dasharray="5,4" stroke-linecap="round" opacity="0.6"/>

  <!-- F labels -->
  <text x="0" y="-90" text-anchor="middle" fill="#9a9690" font-size="13" font-family="sans-serif">F</text>
  <text x="0" y="95" text-anchor="middle" fill="#9a9690" font-size="13" font-family="sans-serif">F</text>
  <text x="-90" y="5" text-anchor="middle" fill="#9a9690" font-size="13" font-family="sans-serif">F</text>
  <text x="90" y="5" text-anchor="middle" fill="#9a9690" font-size="13" font-family="sans-serif">F</text>
  <text x="62" y="58" fill="#9a9690" font-size="13" font-family="sans-serif">F</text>
  <text x="-62" y="-52" fill="#9a9690" font-size="13" font-family="sans-serif">F</text>

  <!-- Angle -->
  <path d="M18,32 A20,20 0 0,1 32,18" fill="none" stroke="#706b65" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="38" y="32" fill="#9a9690" font-size="10" font-family="sans-serif">90°</text>

  <!-- Label -->
  <text x="0" y="115" text-anchor="middle" fill="#4d9460" font-size="13" font-weight="500" font-family="sans-serif">SF₆ — octahedral</text>
</g>

<!-- ═══════════════════════════════════════════════════════ -->
<!-- 7. TRIGONAL BIPYRAMIDAL PCl₅ — corrected 3D             -->
<!-- ═══════════════════════════════════════════════════════ -->
<g transform="translate(170, 830)">
  <!-- Equatorial plane (dashed ellipse) -->
  <ellipse cx="0" cy="5" rx="100" ry="28" fill="none" stroke="#4d9460" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.2"/>

  <!-- AXIAL bonds (straight up and down) -->
  <line x1="0" y1="-20" x2="0" y2="-105" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="0" y1="20" x2="0" y2="105" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>

  <!-- EQUATORIAL bond 1: solid LEFT (in plane of paper) -->
  <line x1="-20" y1="4" x2="-100" y2="4" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>

  <!-- EQUATORIAL bond 2: WEDGE towards viewer (down-right) -->
  <polygon points="12,14 82,38 86,22" fill="#4d9460" fill-opacity="0.35" stroke="#4d9460" stroke-width="1.2" stroke-linejoin="round"/>

  <!-- EQUATORIAL bond 3: DASHED away from viewer (up-right) -->
  <line x1="12" y1="-10" x2="82" y2="-32" stroke="#4d9460" stroke-width="2.2" stroke-dasharray="5,4" stroke-linecap="round" opacity="0.6"/>

  <!-- Central atom (on top of bonds) -->
  <circle cx="0" cy="0" r="20" fill="#2a2a2a" stroke="#4d9460" stroke-width="2.2"/>
  <text x="0" y="5" text-anchor="middle" fill="#e8e5de" font-size="15" font-weight="600" font-family="sans-serif">P</text>

  <!-- Cl labels -->
  <text x="0" y="-115" text-anchor="middle" fill="#9a9690" font-size="14" font-family="sans-serif">Cl</text>
  <text x="0" y="120" text-anchor="middle" fill="#9a9690" font-size="14" font-family="sans-serif">Cl</text>
  <text x="-112" y="8" text-anchor="middle" fill="#9a9690" font-size="14" font-family="sans-serif">Cl</text>
  <text x="96" y="44" fill="#9a9690" font-size="14" font-family="sans-serif">Cl</text>
  <text x="92" y="-30" fill="#9a9690" font-size="14" font-family="sans-serif">Cl</text>

  <!-- Annotations -->
  <text x="20" y="-95" fill="#706b65" font-size="9" font-family="sans-serif">axial</text>
  <text x="20" y="115" fill="#706b65" font-size="9" font-family="sans-serif">axial</text>
  <text x="-112" y="22" fill="#706b65" font-size="9" font-family="sans-serif">equatorial</text>

  <!-- Angle labels -->
  <path d="M-14,-28 A32,32 0 0,0 -32,-5" fill="none" stroke="#706b65" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="-42" y="-22" fill="#9a9690" font-size="10" font-family="sans-serif">90°</text>

  <path d="M-58,12 A25,25 0 0,1 -20,28" fill="none" stroke="#706b65" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="-50" y="38" fill="#9a9690" font-size="10" font-family="sans-serif">120°</text>

  <!-- Label -->
  <text x="0" y="155" text-anchor="middle" fill="#4d9460" font-size="13" font-weight="500" font-family="sans-serif">PCl₅ — trigonal bipyramidal</text>

  <!-- Bond key -->
  <g transform="translate(-95, 170)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>
    <text x="38" y="4" fill="#706b65" font-size="9" font-family="sans-serif">in plane</text>
    <polygon points="0,16 30,12 30,20" fill="#4d9460" fill-opacity="0.35" stroke="#4d9460" stroke-width="1"/>
    <text x="38" y="20" fill="#706b65" font-size="9" font-family="sans-serif">towards you</text>
    <line x1="0" y1="32" x2="30" y2="32" stroke="#4d9460" stroke-width="2" stroke-dasharray="5,4" opacity="0.6"/>
    <text x="38" y="36" fill="#706b65" font-size="9" font-family="sans-serif">away from you</text>
  </g>
</g>

<!-- ═══════════════════════════════════════════════════════ -->
<!-- 8. SQUARE PLANAR XeF₄ — 4 bonds + 2 axial lone pairs   -->
<!-- ═══════════════════════════════════════════════════════ -->
<g transform="translate(510, 830)">
  <!-- Central atom -->
  <circle cx="0" cy="0" r="20" fill="#2a2a2a" stroke="#4d9460" stroke-width="2.2"/>
  <text x="0" y="5" text-anchor="middle" fill="#e8e5de" font-size="13" font-weight="600" font-family="sans-serif">Xe</text>

  <!-- 4 bonds forming a square (up-left, up-right, down-left, down-right) -->
  <line x1="-14" y1="-14" x2="-68" y2="-68" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="14" y1="-14" x2="68" y2="-68" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="-14" y1="14" x2="-68" y2="68" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="14" y1="14" x2="68" y2="68" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>

  <!-- F labels -->
  <text x="-78" y="-72" text-anchor="middle" fill="#9a9690" font-size="14" font-family="sans-serif">F</text>
  <text x="78" y="-72" text-anchor="middle" fill="#9a9690" font-size="14" font-family="sans-serif">F</text>
  <text x="-78" y="78" text-anchor="middle" fill="#9a9690" font-size="14" font-family="sans-serif">F</text>
  <text x="78" y="78" text-anchor="middle" fill="#9a9690" font-size="14" font-family="sans-serif">F</text>

  <!-- TWO LONE PAIRS — axial (perpendicular to the square plane) -->
  <!-- These point left and right since the square is diagonal -->
  <g transform="rotate(90)">
    <path d="M-8,-24 C-18,-48 -14,-75 0,-90 C14,-75 18,-48 8,-24 Z" fill="#d4a24c" fill-opacity="0.10" stroke="#d4a24c" stroke-width="1.2" stroke-opacity="0.4"/>
    <path d="M-5,-27 C-11,-45 -9,-65 0,-76 C9,-65 11,-45 5,-27 Z" fill="#d4a24c" fill-opacity="0.18"/>
  </g>
  <g transform="rotate(-90)">
    <path d="M-8,-24 C-18,-48 -14,-75 0,-90 C14,-75 18,-48 8,-24 Z" fill="#d4a24c" fill-opacity="0.10" stroke="#d4a24c" stroke-width="1.2" stroke-opacity="0.4"/>
    <path d="M-5,-27 C-11,-45 -9,-65 0,-76 C9,-65 11,-45 5,-27 Z" fill="#d4a24c" fill-opacity="0.18"/>
  </g>
  <text x="90" y="5" fill="#d4a24c" font-size="10" font-family="sans-serif">LP</text>
  <text x="-100" y="5" fill="#d4a24c" font-size="10" font-family="sans-serif">LP</text>

  <!-- Angle arc -->
  <path d="M-42,-42 A20,20 0 0,1 -42,42" fill="none" stroke="#706b65" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="-55" y="5" text-anchor="middle" fill="#9a9690" font-size="10" font-family="sans-serif">90°</text>

  <!-- Label -->
  <text x="0" y="115" text-anchor="middle" fill="#4d9460" font-size="13" font-weight="500" font-family="sans-serif">XeF₄ — square planar</text>
</g>

</svg>
