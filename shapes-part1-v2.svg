<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" style="background:#1a1a1a;border-radius:12px;padding:16px 10px">

<!-- ROW 1: Tetrahedral, Pyramidal -->

<!-- TETRAHEDRAL CH4 -->
<g transform="translate(170, 120)">
  <circle cx="0" cy="0" r="18" fill="#2a2a2a" stroke="#4d9460" stroke-width="2"/>
  <text x="0" y="5" text-anchor="middle" fill="#e8e5de" font-size="14" font-weight="600" font-family="sans-serif">C</text>
  <line x1="0" y1="-18" x2="0" y2="-75" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>
  <text x="0" y="-84" text-anchor="middle" fill="#9a9690" font-size="13" font-family="sans-serif">H</text>
  <line x1="-12" y1="12" x2="-65" y2="65" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>
  <text x="-74" y="74" text-anchor="middle" fill="#9a9690" font-size="13" font-family="sans-serif">H</text>
  <polygon points="8,12 55,45 55,58" fill="#4d9460" fill-opacity="0.4" stroke="#4d9460" stroke-width="1.2"/>
  <text x="64" y="58" fill="#9a9690" font-size="13" font-family="sans-serif">H</text>
  <line x1="12" y1="-6" x2="65" y2="-38" stroke="#4d9460" stroke-width="2" stroke-dasharray="5,4" opacity="0.6"/>
  <text x="74" y="-38" fill="#9a9690" font-size="13" font-family="sans-serif">H</text>
  <path d="M-35,35 A45,45 0 0,1 -8,-42" fill="none" stroke="#706b65" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="-42" y="-6" fill="#9a9690" font-size="10" font-family="sans-serif">109.5°</text>
  <text x="0" y="95" text-anchor="middle" fill="#4d9460" font-size="12" font-weight="500" font-family="sans-serif">CH₄ — tetrahedral</text>
</g>

<!-- PYRAMIDAL NH3 -->
<g transform="translate(510, 120)">
  <circle cx="0" cy="0" r="18" fill="#2a2a2a" stroke="#4d9460" stroke-width="2"/>
  <text x="0" y="5" text-anchor="middle" fill="#e8e5de" font-size="14" font-weight="600" font-family="sans-serif">N</text>
  <!-- Lone pair UP -->
  <path d="M-8,-22 C-18,-46 -14,-70 0,-84 C14,-70 18,-46 8,-22 Z" fill="#d4a24c" fill-opacity="0.10" stroke="#d4a24c" stroke-width="1.2" stroke-opacity="0.45"/>
  <path d="M-5,-25 C-10,-44 -9,-64 0,-74 C9,-64 10,-44 5,-25 Z" fill="#d4a24c" fill-opacity="0.20"/>
  <text x="28" y="-52" fill="#d4a24c" font-size="10" font-family="sans-serif">lone pair</text>
  <!-- 3 H bonds DOWN -->
  <line x1="-12" y1="14" x2="-70" y2="72" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>
  <text x="-80" y="82" text-anchor="middle" fill="#9a9690" font-size="13" font-family="sans-serif">H</text>
  <line x1="12" y1="14" x2="70" y2="72" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>
  <text x="80" y="82" text-anchor="middle" fill="#9a9690" font-size="13" font-family="sans-serif">H</text>
  <polygon points="-7,16 -14,74 14,74 7,16" fill="#4d9460" fill-opacity="0.35" stroke="#4d9460" stroke-width="1"/>
  <text x="0" y="90" text-anchor="middle" fill="#9a9690" font-size="13" font-family="sans-serif">H</text>
  <!-- Angle arc — between left and right H bonds, well below N -->
  <path d="M-48,50 A55,30 0 0,1 48,50" fill="none" stroke="#706b65" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="0" y="62" text-anchor="middle" fill="#9a9690" font-size="10" font-family="sans-serif">107°</text>
  <text x="0" y="110" text-anchor="middle" fill="#4d9460" font-size="12" font-weight="500" font-family="sans-serif">NH₃ — pyramidal</text>
</g>

<!-- ROW 2: Trigonal planar, Bent -->

<!-- TRIGONAL PLANAR BF3 -->
<g transform="translate(170, 300)">
  <circle cx="0" cy="0" r="18" fill="#2a2a2a" stroke="#4d9460" stroke-width="2"/>
  <text x="0" y="5" text-anchor="middle" fill="#e8e5de" font-size="14" font-weight="600" font-family="sans-serif">B</text>
  <line x1="0" y1="-18" x2="0" y2="-75" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>
  <text x="0" y="-84" text-anchor="middle" fill="#9a9690" font-size="13" font-family="sans-serif">F</text>
  <line x1="-14" y1="10" x2="-68" y2="44" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>
  <text x="-78" y="52" text-anchor="middle" fill="#9a9690" font-size="13" font-family="sans-serif">F</text>
  <line x1="14" y1="10" x2="68" y2="44" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>
  <text x="78" y="52" text-anchor="middle" fill="#9a9690" font-size="13" font-family="sans-serif">F</text>
  <path d="M-36,24 A42,42 0 0,1 -8,-42" fill="none" stroke="#706b65" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="-40" y="-10" fill="#9a9690" font-size="10" font-family="sans-serif">120°</text>
  <text x="0" y="82" text-anchor="middle" fill="#4d9460" font-size="12" font-weight="500" font-family="sans-serif">BF₃ — trigonal planar</text>
</g>

<!-- BENT H2O -->
<g transform="translate(510, 300)">
  <circle cx="0" cy="0" r="18" fill="#2a2a2a" stroke="#4d9460" stroke-width="2"/>
  <text x="0" y="5" text-anchor="middle" fill="#e8e5de" font-size="14" font-weight="600" font-family="sans-serif">O</text>
  <!-- 2 lone pairs UP -->
  <g transform="rotate(-22)">
    <path d="M-7,-22 C-16,-44 -12,-68 0,-82 C12,-68 16,-44 7,-22 Z" fill="#d4a24c" fill-opacity="0.10" stroke="#d4a24c" stroke-width="1.1" stroke-opacity="0.4"/>
    <path d="M-4,-25 C-10,-42 -8,-60 0,-70 C8,-60 10,-42 4,-25 Z" fill="#d4a24c" fill-opacity="0.18"/>
  </g>
  <g transform="rotate(22)">
    <path d="M-7,-22 C-16,-44 -12,-68 0,-82 C12,-68 16,-44 7,-22 Z" fill="#d4a24c" fill-opacity="0.10" stroke="#d4a24c" stroke-width="1.1" stroke-opacity="0.4"/>
    <path d="M-4,-25 C-10,-42 -8,-60 0,-70 C8,-60 10,-42 4,-25 Z" fill="#d4a24c" fill-opacity="0.18"/>
  </g>
  <text x="0" y="-82" text-anchor="middle" fill="#d4a24c" font-size="10" font-family="sans-serif">2 lone pairs</text>
  <!-- 2 H bonds DOWN -->
  <line x1="-12" y1="14" x2="-68" y2="68" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>
  <text x="-78" y="78" text-anchor="middle" fill="#9a9690" font-size="13" font-family="sans-serif">H</text>
  <line x1="12" y1="14" x2="68" y2="68" stroke="#4d9460" stroke-width="2.5" stroke-linecap="round"/>
  <text x="78" y="78" text-anchor="middle" fill="#9a9690" font-size="13" font-family="sans-serif">H</text>
  <!-- Angle arc -->
  <path d="M-38,38 A48,30 0 0,1 38,38" fill="none" stroke="#706b65" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="0" y="48" text-anchor="middle" fill="#9a9690" font-size="10" font-family="sans-serif">104.5°</text>
  <text x="0" y="100" text-anchor="middle" fill="#4d9460" font-size="12" font-weight="500" font-family="sans-serif">H₂O — bent</text>
</g>

<!-- ROW 3 labels: Linear, Octahedral -->
<text x="170" y="420" text-anchor="middle" fill="#706b65" font-size="11" font-family="sans-serif">+ Linear (CO₂), Octahedral (SF₆),</text>
<text x="170" y="436" text-anchor="middle" fill="#706b65" font-size="11" font-family="sans-serif">Trigonal bipyramidal (PCl₅),</text>
<text x="170" y="452" text-anchor="middle" fill="#706b65" font-size="11" font-family="sans-serif">Square planar (XeF₄)</text>
<text x="170" y="472" text-anchor="middle" fill="#4d9460" font-size="10" font-family="sans-serif">→ see shapes-part2.svg</text>

</svg>
